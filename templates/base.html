<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Centro de Adopción{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f7f4ef;
            --surface: #ffffff;
            --border: #e2ddd6;
            --text: #1a1a18;
            --muted: #6b6860;
            --accent: #c45c2e;
            --accent-light: #f5ece6;
            --green: #2e7d4f;
            --green-light: #e8f5ee;
            --red: #c0392b;
            --red-light: #fdf0ef;
            --radius: 10px;
        }
        body {
            font-family: 'Georgia', serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: var(--text);
            color: white;
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header a { color: white; text-decoration: none; font-size: 1.2rem; font-weight: bold; letter-spacing: 0.03em; }
        nav a { color: #ccc; text-decoration: none; font-size: 0.85rem; margin-left: 24px; font-family: monospace; }
        nav a:hover { color: white; }
        main { max-width: 960px; margin: 0 auto; padding: 40px 24px; }
        h1 { font-size: 1.9rem; margin-bottom: 8px; }
        h2 { font-size: 1.3rem; margin-bottom: 20px; color: var(--muted); font-weight: normal; }
        .btn {
            display: inline-block;
            padding: 10px 22px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: var(--red); color: white; }
        .btn-success { background: var(--green); color: white; }
        input, select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            margin-top: 4px;
        }
        input:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
        label { font-size: 0.85rem; color: var(--muted); font-family: monospace; }
        .field { margin-bottom: 18px; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 10px 14px; background: var(--bg); font-family: monospace; font-size: 0.8rem; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: monospace;
        }
        .badge-adopted { background: var(--green-light); color: var(--green); }
        .badge-available { background: var(--accent-light); color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <a href="/">🐾 Centro de Adopción</a>
        <nav>
            <a href="/">Catálogo</a>
            <a href="admin">Admin</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
