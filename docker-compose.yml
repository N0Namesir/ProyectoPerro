services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user_perro
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: proyectoperro
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://user_perro:password123@db:5432/proyectoperro"